<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | QuizMaster</title>
    <style>
      :root {
        --accent: #0a2a6e;
        --accent-light: #dce8f8;
        --bg: #f7f9fc;
        --text: #1a1a1a;
        --muted: #667085;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #f8f9fd, #eef4fb);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: white;
        border: 1px solid #d7e0ea;
        border-radius: 20px;
        box-shadow: 0 18px 50px rgba(10, 42, 110, 0.12);
        padding: 40px 28px;
        text-align: center;
      }
      .badge {
        width: 88px;
        height: 88px;
        margin: 0 auto 20px;
        border-radius: 20px;
        background: radial-gradient(circle at 45% 25%, #f4f8fc 8%, #8ea0af 35%, #51606f 60%, #2e3b47 100%);
        border: 1px solid #b8b8b8;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 42px;
      }
      h1 {
        margin: 0;
        font-size: 72px;
        line-height: 1;
        color: var(--accent);
      }
      h2 {
        margin: 8px 0 16px;
        font-size: 28px;
      }
      p {
        color: var(--muted);
        line-height: 1.6;
        margin: 0 0 26px;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      a {
        display: inline-block;
        text-decoration: none;
        border-radius: 10px;
        padding: 12px 18px;
        font-weight: 700;
      }
      .primary {
        background: var(--accent);
        color: white;
      }
      .secondary {
        border: 1px solid #d7e0ea;
        color: var(--accent);
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">?</div>
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you requested does not exist or may have been moved.</p>
      <div class="actions">
        <a class="primary" href="/">Go to Home</a>
        <a class="secondary" href="/login">Go to Login</a>
      </div>
    </div>
  </body>
</html>
